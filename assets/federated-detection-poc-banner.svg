<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Federated Detection POC</title>
  <desc id="desc">Banner for a privacy-preserving object detection research repository built around federated learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071225"/>
      <stop offset="60%" stop-color="#081936"/>
      <stop offset="100%" stop-color="#0c0b2a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4bc7ff"/>
      <stop offset="52%" stop-color="#5c8cff"/>
      <stop offset="100%" stop-color="#b05cff"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3fe7ff"/>
      <stop offset="100%" stop-color="#6f79ff"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b7dff"/>
      <stop offset="100%" stop-color="#bb64ff"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="waveDots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2" fill="#1e82ff" opacity="0.35"/>
    </pattern>
