      .mini { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.14); stroke-width: 1.4; }
      .pill { fill: rgba(9, 20, 50, 0.85); stroke: #2f8cff; stroke-width: 1.8; }
      .caption { font-family: Inter, Arial, sans-serif; fill: #eef3ff; }
      .muted { font-family: Inter, Arial, sans-serif; fill: #c9d2eb; }
      .small { font-family: Inter, Arial, sans-serif; fill: #9cd7ff; }
      .tiny { font-family: Inter, Arial, sans-serif; fill: #d9e1ff; }
    </style>
